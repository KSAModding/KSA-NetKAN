name: Inflate Module
description: Run commands in the NetKAN container to inflate a given module

inputs:
  AWS_ACCESS_KEY_ID:
    description: Credentials for AWS
    required: true
  AWS_SECRET_ACCESS_KEY:
    description: Credentials for AWS
    required: true
  AWS_DEFAULT_REGION:
    description: Region for AWS
    required: true
  identifier:
    description: The netkan to inflate
    required: true

runs:
  using: docker
  image: kspckan/netkan
  env:
    GAME_ID:               ksa
    NETKAN_REMOTES:        ksa=https://github.com/KSAModding/KSA-NetKAN.git
    CKANMETA_REMOTES:      ksa=https://github.com/KSAModding/KSA-CKAN-meta.git
    INFLATION_QUEUES:      ksa=InboundKsa.fifo
    AWS_ACCESS_KEY_ID:     ${{ inputs.AWS_ACCESS_KEY_ID     }}
    AWS_SECRET_ACCESS_KEY: ${{ inputs.AWS_SECRET_ACCESS_KEY }}
    AWS_DEFAULT_REGION:    ${{ inputs.AWS_DEFAULT_REGION    }}
  args:
    - inflate-netkan
    - ${{ inputs.identifier }}
