name: Metadata problem
description: Report a mod that installs incorrectly or has wrong metadata
title: "[Metadata]: "
labels: [bug, metadata]
body:
  - type: input
    id: mod-name
    attributes:
      label: Mod
      description: Which mod has the problem? (name or CKAN identifier)
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      description: Which version of the mod did you install?

  - type: input
    id: game-version
    attributes:
      label: KSA Version
      description: Which game version are you running?

  - type: textarea
    id: what-happened
    attributes:
      label: What is wrong?
      description: Wrong files installed, wrong game compatibility, missing or wrong dependency, broken download, etc. Also tell us what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log or error output. This will be automatically formatted into code, so no need for backticks.
